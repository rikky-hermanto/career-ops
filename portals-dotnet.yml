# portals-dotnet.yml — C#/.NET focused scan config
# Use with: $env:CAREER_OPS_PORTALS="portals-dotnet.yml"; $env:CAREER_OPS_PIPELINE="data/pipeline-dotnet.md"; node scan.mjs
#
# Title filter: ONLY roles that explicitly mention .NET or C# in the title.
# Note: many C# roles use generic titles ("Senior Backend Engineer") — use the
# websearch queries below to catch those via JD keyword matching.

title_filter:
  positive:
    - ".NET"
    - "C#"
    - "ASP.NET"
    - "dotnet"
    - "Dot Net"

  negative:
    - "Frontend"
    - "Front-end"
    - "Mobile Engineer"
    - "iOS"
    - "Android"
    - "UI/UX"
    - "Data Scientist"
    - "Data Analyst"
    - "Marketing"
    - "Sales"
    - "Recruiter"
    - "HR"
    - "Junior"
    - "Entry Level"
    - "Graduate"
    - "Intern"
    - "PHP"
    - "Laravel"
    - "WordPress"
    - "QA Engineer"
    - "Test Engineer"

  seniority_boost:
    - "Staff"
    - "Principal"
    - "Lead"
    - "Architect"
    - "Manager"
    - "Senior"

# -- WebSearch Discovery Queries --
# All queries explicitly include .NET / C# to surface roles where the JD mentions
# C# but the title doesn't (very common — most listings just say "Senior Backend Engineer").

search_queries:

  - name: LinkedIn — Senior .NET / C# Backend Engineer remote
    query: 'site:linkedin.com/jobs "Senior" ".NET" OR "C#" "Backend Engineer" OR "Software Engineer" remote APAC OR Australia OR Singapore'
    enabled: true

  - name: LinkedIn — .NET Tech Lead / Staff Engineer
    query: 'site:linkedin.com/jobs ".NET" OR "C#" "Technical Lead" OR "Tech Lead" OR "Staff Engineer" remote APAC OR Australia OR Singapore'
    enabled: true

  - name: LinkedIn — Senior .NET Engineer Europe relocation
    query: 'site:linkedin.com/jobs ".NET" OR "C#" "Senior" "visa sponsorship" OR "relocation" backend OR engineer'
    enabled: true

  - name: LinkedIn — Senior .NET / C# Engineer AU/NZ
    query: 'site:linkedin.com/jobs ".NET" OR "C#" "Senior" engineer OR backend Australia OR "New Zealand" remote OR hybrid'
    enabled: true

  - name: Greenhouse — C#/.NET Backend roles
    query: 'site:job-boards.greenhouse.io ".NET" OR "C#" "Senior" OR "Staff" OR "Lead" backend OR engineer remote'
    enabled: true

  - name: Ashby — C#/.NET Backend roles
    query: 'site:jobs.ashbyhq.com ".NET" OR "C#" "Senior" OR "Staff" OR "Lead" backend OR engineer remote'
    enabled: true

  - name: Seek — C#/.NET Senior Engineer AU
    query: 'site:seek.com.au ".NET" OR "C#" "Senior" "backend" OR "software engineer" remote OR hybrid Australia'
    enabled: true

  - name: YC — .NET / C# Backend APAC
    query: 'site:workatastartup.com ".NET" OR "C#" "Senior Backend" OR "Staff Engineer" remote APAC OR Australia'
    enabled: true

  - name: HN Who's Hiring — .NET / C#
    query: 'site:news.ycombinator.com ".NET" OR "C#" "Senior Backend" OR "Technical Lead" OR "Staff Engineer" remote'
    enabled: true

