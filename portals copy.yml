# Portal Scanner Configuration
# Tailored for: Rikky Hermanto Hasibuan
# Profile: Senior Backend Engineer / Tech Lead — C#/.NET, Distributed Systems, Cloud-Native
# Target markets: Australia (primary), Singapore, Japan, Europe (relocation), APAC-aligned remote
# Industries: SaaS/B2B, Fintech/Payments, Healthtech, Developer Tooling, Travel Tech, Climate Tech
# Generated from config/profile.yml on 2026-05-13

# -- Title filter --
# At least 1 positive must match AND 0 negatives must match (case-insensitive).
# NOTE: .NET and Java intentionally NOT in negatives — Rikky IS a .NET/Java developer.

title_filter:
  positive:
    - \"Senior Backend\"
    - \"Staff Engineer\"
    - \"Technical Lead\"
    - \"Tech Lead\"
    - \"Solutions Architect\"
    - \"Engineering Manager\"
    - \"Principal Engineer\"
    - \"AI Engineer\"
    - \"Applied AI\"
    - \"Platform Engineer\"
    - \"Infrastructure Engineer\"
    - \"Cloud Engineer\"
    - \"Distributed Systems\"
    - \"Backend Software Engineer\"
    - \".NET Engineer\"
    - \"C# Engineer\"
    - \"Java Engineer\"

  negative:
    - \"Frontend\"
    - \"Front-end\"
    - \"Mobile Engineer\"
    - \"iOS\"
    - \"Android\"
    - \"UI/UX\"
    - \"Product Designer\"
    - \"Data Scientist\"
    - \"Data Analyst\"
    - \"Marketing\"
    - \"Sales\"
    - \"Recruiter\"
    - \"HR\"
    - \"Junior\"
    - \"Entry Level\"
    - \"Graduate\"
    - \"Intern\"
    - \"PHP\"
    - \"Laravel\"
    - \"WordPress\"
    - \"Blockchain\"
    - \"Web3\"
    - \"QA Engineer\"
    - \"Test Engineer\"
    - \"Manual Tester\"

  # Boost score if these words appear (internal sorting only)
  seniority_boost:
    - \"Staff\"
    - \"Principal\"
    - \"Lead\"
    - \"Architect\"
    - \"Manager\"

# -- WebSearch Discovery Queries --
# Broad discovery across job portals using site: filters.
# Enabled queries run during /career-ops scan.

search_queries:
  # -- Y Combinator --
  - name: YC — Backend / Founding Engineer APAC
    query: 'site:workatastartup.com \"Senior Backend Engineer\" OR \"Founding Engineer\" OR \"Staff Engineer\" remote APAC OR Australia'
    enabled: true

  - name: YC — AI Engineer remote APAC
    query: 'site:workatastartup.com \"AI Engineer\" OR \"Applied AI\" remote APAC OR Australia OR Singapore'
    enabled: true

  # -- LinkedIn --
  # LinkedIn is the dominant job board globally and the #1 source for APAC/Australian roles.
  # Searched via Google site: filters — LinkedIn's own API is not publicly accessible.

  - name: LinkedIn — Senior Backend Engineer APAC
    query: 'site:linkedin.com/jobs \"Senior Backend Engineer\" remote APAC OR Australia OR Singapore OR \"New Zealand\"'
    enabled: true

  - name: LinkedIn — Technical Lead / Tech Lead APAC
    query: 'site:linkedin.com/jobs \"Technical Lead\" OR \"Tech Lead\" backend remote APAC OR Australia OR Singapore'
    enabled: true

  - name: LinkedIn — Staff / Principal Engineer backend
    query: 'site:linkedin.com/jobs \"Staff Engineer\" OR \"Principal Engineer\" backend OR distributed remote APAC OR Australia'
    enabled: true

  - name: LinkedIn — Senior .NET / C# Engineer remote
    query: 'site:linkedin.com/jobs \"Senior\" \".NET\" OR \"C#\" \"Software Engineer\" OR \"Backend Engineer\" remote APAC OR Australia'
    enabled: true

  - name: LinkedIn — AI Engineer backend remote APAC
    query: 'site:linkedin.com/jobs \"AI Engineer\" OR \"Applied AI Engineer\" backend OR distributed remote APAC OR Australia OR Singapore'
    enabled: true

  - name: LinkedIn — Senior Backend Europe relocation
    query: 'site:linkedin.com/jobs \"Senior Backend Engineer\" OR \"Staff Engineer\" OR \"Technical Lead\" Europe \"visa sponsorship\" OR \"relocation\"'
    enabled: true

  - name: LinkedIn — Founding Engineer / Tech Lead startup
    query: 'site:linkedin.com/jobs \"Founding Engineer\" OR \"Technical Lead\" OR \"Lead Backend\" startup remote APAC OR Australia'
    enabled: true

  # -- Remote-first async culture companies (Grafana/Supabase archetype) --

  - name: Greenhouse — Remote-first async culture backend
    query: 'site:job-boards.greenhouse.io \"Senior Backend\" OR \"Staff Engineer\" OR \"Technical Lead\" \"fully remote\" OR \"remote-first\" OR \"all-remote\" -\"hybrid\" developer-tools OR infrastructure OR platform'
    enabled: true

  - name: Ashby — Remote-first async culture backend
    query: 'site:jobs.ashbyhq.com \"Senior Backend\" OR \"Staff Engineer\" OR \"Technical Lead\" \"fully remote\" OR \"remote-first\" OR \"async\" developer-tools OR infrastructure OR platform OR open-source'
    enabled: true

  # -- HN Who's Hiring --

  - name: HN Who's Hiring — Backend APAC
    query: 'site:news.ycombinator.com \"Senior Backend\" OR \"Technical Lead\" OR \"Staff Engineer\" APAC OR Australia OR Singapore OR remote'
    enabled: true


