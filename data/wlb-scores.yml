# WLB Score Database
#
# Scale: 1.0–5.0
#   5.0  = Exceptional (remote-by-design, 30+ PTO, GPTW® certified, mandatory shutdowns)
#   4.0+ = Strong (remote-first, positive reviews, no burnout pattern)
#   3.5  = Good (average tech; some flexibility but no standout signal)
#   3.0  = Average (fintech/startup grind, mixed reviews)
#   2.5  = Below average (burnout flagged, long-hours culture documented)
#   1.0  = Poor (on-call 24/7, no remote, extreme crunch)
#
# Scoring matrix (see modes/_profile.md for full rules):
#   Primary: Glassdoor WLB sub-rating (1–5)
#   Bonus:   +0.3 remote-by-design / +0.2 GPTW® / +0.1 Forbes/Built In
#   Penalty: −0.2 fintech regulatory / −0.1 hypergrowth startup
#
# source:
#   glassdoor = Glassdoor WLB sub-rating (confirmed, ≥ 50 reviews preferred)
#   est       = estimated from remote culture, GPTW, industry signals, review themes
#
# To update: change the score and update the date field.
# To add a new company: normalize the key → lowercase + hyphens (e.g. "Grafana Labs" → "grafana-labs").

